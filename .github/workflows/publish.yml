name: Publish Xray-core AAR to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Xray-core version (e.g., 25.12.8)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      
      - name: Clone Xray-core
        run: |
          git clone --depth=1 --branch v${{ github.event.inputs.version }} https://github.com/XTLS/Xray-core.git
          cd Xray-core
          go mod tidy
          go get golang.org/x/mobile/cmd/gobind
      
      - name: Create libxray binding
        run: |
          cd Xray-core
          mkdir -p libxray
          printf '%s\n' 'package libxray' '' 'import (' '	"fmt"' '	"strings"' '' '	"github.com/xtls/xray-core/core"' '	_ "github.com/xtls/xray-core/main/json"' '	_ "github.com/xtls/xray-core/proxy/freedom"' '	_ "github.com/xtls/xray-core/proxy/socks"' '	_ "github.com/xtls/xray-core/proxy/http"' '	_ "github.com/xtls/xray-core/transport/internet/tcp"' '	_ "github.com/xtls/xray-core/transport/internet/udp"' ')' '' 'var instance *core.Instance' '' 'func StartXray(configJson string) error {' '	if instance != nil {' '		return fmt.Errorf("xray is already running")' '	}' '	config, err := core.LoadConfig("json", strings.NewReader(configJson))' '	if err != nil {' '		return fmt.Errorf("failed to load config: %v", err)' '	}' '	instance, err = core.New(config)' '	if err != nil {' '		return fmt.Errorf("failed to create instance: %v", err)' '	}' '	if err := instance.Start(); err != nil {' '		instance = nil' '		return fmt.Errorf("failed to start: %v", err)' '	}' '	return nil' '}' '' 'func StopXray() error {' '	if instance == nil {' '		return fmt.Errorf("xray is not running")' '	}' '	if err := instance.Close(); err != nil {' '		return fmt.Errorf("failed to stop: %v", err)' '	}' '	instance = nil' '	return nil' '}' '' 'func GetVersion() string {' '	return core.Version()' '}' > libxray/libxray.go
          echo "Created libxray.go"
          cat libxray/libxray.go
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
      
      - name: Build AAR with gomobile
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd Xray-core
          gomobile bind -v -target=android/arm64 -androidapi 21 -o ../LibXray.aar ./libxray
          echo "Built LibXray.aar"
          ls -lh ../LibXray.aar
      
      - name: Create Maven structure
        run: |
          mkdir -p maven-repo/com/zero/xray-core/${{ github.event.inputs.version }}
          cp LibXray.aar maven-repo/com/zero/xray-core/${{ github.event.inputs.version }}/xray-core-${{ github.event.inputs.version }}.aar
          
          cat > maven-repo/com/zero/xray-core/${{ github.event.inputs.version }}/xray-core-${{ github.event.inputs.version }}.pom << 'POMEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd" xmlns="http://maven.apache.org/POM/4.0.0"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.zero</groupId>
            <artifactId>xray-core</artifactId>
            <version>VERSION_PLACEHOLDER</version>
            <packaging>aar</packaging>
            <name>Xray-core</name>
            <description>Xray-core AAR with Java bindings for Android</description>
            <url>https://github.com/XTLS/Xray-core</url>
            <licenses>
              <license>
                <name>GNU General Public License v3.0</name>
                <url>https://github.com/XTLS/Xray-core/blob/main/LICENSE</url>
              </license>
            </licenses>
          </project>
          POMEOF
          
          sed -i "s/VERSION_PLACEHOLDER/${{ github.event.inputs.version }}/g" maven-repo/com/zero/xray-core/${{ github.event.inputs.version }}/xray-core-${{ github.event.inputs.version }}.pom
          
          echo "Created Maven repository structure"
          ls -la maven-repo/com/zero/xray-core/${{ github.event.inputs.version }}/
      
      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd maven-repo
          
          curl -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            --data-binary "@com/zero/xray-core/${{ github.event.inputs.version }}/xray-core-${{ github.event.inputs.version }}.pom" \
            "https://maven.pkg.github.com/${{ github.repository }}/com/zero/xray-core/${{ github.event.inputs.version }}/xray-core-${{ github.event.inputs.version }}.pom"
          
          curl -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            --data-binary "@com/zero/xray-core/${{ github.event.inputs.version }}/xray-core-${{ github.event.inputs.version }}.aar" \
            "https://maven.pkg.github.com/${{ github.repository }}/com/zero/xray-core/${{ github.event.inputs.version }}/xray-core-${{ github.event.inputs.version }}.aar"
          
          echo "Published to GitHub Packages"
